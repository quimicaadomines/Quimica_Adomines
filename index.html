<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, user-scalable=yes">
  <title>Química Adômines</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#38bdf8">
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="musica" src="musica.mp3" loop></audio>
<audio id="click" src="click.mp3"></audio>
<audio id="bubble" src="bubble.mp3"></audio>
<audio id="transicaoSom" src="transicao.mp3"></audio>
<audio id="somConquista" src="conquista.mp3"></audio>
<audio id="somAplausos" src="aplausus.mp3"></audio>

<header class="topo">
  <div class="esquerda">
    <button class="icon-btn" onclick="toggleMenu(event)" title="Configurações">⚙️</button>
    <button class="icon-btn" onclick="toggleMute()" id="muteBtn" title="Som">🔊</button>
    <button class="icon-btn" onclick="abrirConquistas()" title="Conquistas">🏅</button>
    <!-- Botões Download e Fullscreen serão injetados aqui pelo global.js -->
    <button class="icon-btn" onclick="toggleAssistenteVoz()" id="btnAssistente" title="Assistente de Voz">🎤</button>
    <div id="trofeus-globais" class="trofeus-container"></div>
  </div>
  
  <div class="direita">
    <button class="icon-btn btn-chat-global" onclick="abrirQuimiChat()" title="QuimiChat">💬</button>
    <button class="icon-btn btn-tabela-global" onclick="abrirTabelaPeriodica()" title="Tabela Periódica">📊</button>
    <button class="icon-btn" onclick="toggleModo()" id="temaBtn">🌙</button>
  </div>
</header>

<main class="container">
  <img src="logo.png" class="logo" id="logo" alt="Logo Química Adômines">
  <p class="descricao">
    Química Adômines tem origem no latim “ad omnes”, que significa “para todos”. 
    O jogo foi desenvolvido com o objetivo de tornar o ensino de Química mais acessível, interativo e compreensível para diferentes públicos.
  </p>
  <button class="botao-iniciar" onclick="mudarTela('modos.html')">Iniciar Jogo</button>
</main>

<footer class="rodape">
  <div class="adm"><button class="btn-adm" onclick="abrirChat()">[ADM]</button></div>
  <div class="creditos">
    <p class="creditos-titulo">Desenvolvido por</p>
    <p class="autor">Zayde CASTRO</p>
    <p class="email">zayde.lucas@aluno.uece.br</p>
    <div class="logos"><img src="pibid.png"><img src="faced.png"><img src="uece.png"></div>
  </div>
</footer>

<script src="global.js"></script>
<script src="assistente.js"></script>
<script src="script.js"></script>
</body>
</html>
